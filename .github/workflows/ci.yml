name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    environment: rbpo-lab

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lab2
          POSTGRES_USER: ${{ secrets.DB_USERNAME }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d lab2"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Restore keystore from Secrets
        env:
          SERVER_KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$SERVER_KEYSTORE_BASE64" ]; then
            echo "SERVER_KEYSTORE_BASE64 is empty. Add it to GitHub Secrets."
            exit 1
          fi
          echo "$SERVER_KEYSTORE_BASE64" | base64 -d > src/main/resources/lab6-server.jks
          ls -la src/main/resources/lab6-server.jks

      - name: Build, test, package
        env:
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SERVER_PASS: ${{ secrets.SERVER_PASS }}
        run: mvn -B clean test package

      - name: Upload artifact (jar)
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-jar
          path: target/*.jar
